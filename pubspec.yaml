name: m3t_organizer
description: "Flutter app for m3t event organizers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  auth_repository:
    path: packages/auth_repository
  domain:
    path: packages/domain  
  equatable: ^2.0.8

  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  m3t_api:
    path: packages/m3t_api
  mobile_scanner: ^7.2.0
  pinput: ^6.0.2
  qr_flutter: ^4.1.0
  screen_brightness: ^2.1.7
  url_launcher: ^6.3.2

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.11.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.4
  very_good_analysis: ^10.1.0


# Flutter Launcher Icons - generates app icons from assets/icon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true # Required by Apple (no transparent backgrounds)
  image_path: "assets/icon/icon_master.png" # 1024x1024 source
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"


flutter:

  uses-material-design: true

  assets:
    - assets/icon/
